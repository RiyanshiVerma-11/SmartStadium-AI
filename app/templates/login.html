<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SmartStadium AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e3a8a 0%, #0f172a 40%, #020617 100%);
            overflow: hidden;
        }
        .glass {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .otp-input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }
        .role-card.active {
            border-color: #38bdf8;
            background: rgba(56, 189, 248, 0.1);
        }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen text-slate-100 flex items-center justify-center p-6">
    <!-- Background Decor -->
    <div class="fixed top-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-600/20 blur-[120px] rounded-full"></div>
    <div class="fixed bottom-[-10%] left-[-10%] w-[40%] h-[40%] bg-indigo-600/20 blur-[120px] rounded-full"></div>

    <div class="w-full max-w-lg">
        <div class="glass rounded-[3rem] p-8 md:p-12 shadow-2xl relative overflow-hidden">
            <!-- Header -->
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-3xl bg-gradient-to-br from-blue-500 to-indigo-600 mb-6 shadow-lg shadow-blue-500/20">
                    <span class="text-3xl">🏟️</span>
                </div>
                <h1 class="text-4xl font-black tracking-tight mb-2">SmartStadium<span class="text-blue-400">AI</span></h1>
                <p class="text-slate-400 font-medium">Elevating your matchday experience</p>
            </div>

            <!-- Login Method Selection -->
            <div id="login-methods" class="space-y-4">
                <button onclick="showStep('auth-form', 'email')" class="w-full flex items-center justify-center gap-3 py-4 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all group">
                    <span class="text-xl">✉️</span>
                    <span class="font-semibold">Continue with Email</span>
                </button>
                <button onclick="showStep('auth-form', 'phone')" class="w-full flex items-center justify-center gap-3 py-4 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all group">
                    <span class="text-xl">📱</span>
                    <span class="font-semibold">Continue with Phone</span>
                </button>
                <div class="flex items-center gap-4 my-6">
                    <div class="h-[1px] flex-1 bg-white/10"></div>
                    <span class="text-xs font-bold uppercase tracking-widest text-slate-500">Or</span>
                    <div class="h-[1px] flex-1 bg-white/10"></div>
                </div>
                <button onclick="fakeLogin('google')" class="w-full flex items-center justify-center gap-3 py-4 rounded-2xl bg-white text-slate-900 font-bold hover:bg-slate-100 transition-all">
                    <img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" class="w-5 h-5" alt="Google">
                    <span>Sign in with Google</span>
                </button>
            </div>

            <!-- Auth Form (Email/Phone) -->
            <div id="auth-form" class="hidden space-y-6">
                <div>
                    <label id="input-label" class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Email Address</label>
                    <input id="auth-input" type="text" placeholder="Enter your email" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 focus:outline-none focus:border-blue-500 transition-all text-lg">
                </div>
                <button onclick="showStep('otp-verify')" class="w-full py-4 rounded-2xl bg-blue-600 font-bold text-lg shadow-lg shadow-blue-600/30 hover:bg-blue-500 transition-all">
                    Send Verification Code
                </button>
                <button onclick="showStep('login-methods')" class="w-full text-sm font-bold text-slate-500 hover:text-slate-300">Back to all methods</button>
            </div>

            <!-- OTP Verification -->
            <div id="otp-verify" class="hidden space-y-8 text-center">
                <div>
                    <h3 class="text-xl font-bold mb-2">Verify your account</h3>
                    <p class="text-sm text-slate-400">We've sent a 4-digit code to your device</p>
                </div>
                <div class="flex justify-center gap-4">
                    <input type="text" maxlength="1" class="otp-input w-14 h-16 text-2xl font-black text-center bg-white/5 border border-white/10 rounded-2xl focus:outline-none">
                    <input type="text" maxlength="1" class="otp-input w-14 h-16 text-2xl font-black text-center bg-white/5 border border-white/10 rounded-2xl focus:outline-none">
                    <input type="text" maxlength="1" class="otp-input w-14 h-16 text-2xl font-black text-center bg-white/5 border border-white/10 rounded-2xl focus:outline-none">
                    <input type="text" maxlength="1" class="otp-input w-14 h-16 text-2xl font-black text-center bg-white/5 border border-white/10 rounded-2xl focus:outline-none">
                </div>
                <button onclick="showStep('role-select')" class="w-full py-4 rounded-2xl bg-blue-600 font-bold text-lg shadow-lg shadow-blue-600/30 hover:bg-blue-500 transition-all">
                    Verify & Continue
                </button>
                <p class="text-sm text-slate-500">Didn't receive code? <button class="text-blue-400 font-bold">Resend</button></p>
            </div>

            <!-- Role Selection -->
            <div id="role-select" class="hidden space-y-6">
                <div class="text-center mb-6">
                    <h3 class="text-xl font-bold mb-2">Select your persona</h3>
                    <p class="text-sm text-slate-400">Tailoring the experience for you</p>
                </div>
                <div class="grid gap-4">
                    <button onclick="selectRole('fan')" class="role-card group flex items-center gap-4 p-5 rounded-[2rem] border border-white/10 bg-white/5 hover:border-blue-500/50 transition-all text-left">
                        <div class="w-12 h-12 flex items-center justify-center rounded-2xl bg-blue-500/10 text-blue-400 group-hover:bg-blue-500 group-hover:text-white transition-all">👤</div>
                        <div>
                            <p class="font-bold text-lg">Fan</p>
                            <p class="text-xs text-slate-500">I'm here to watch the game</p>
                        </div>
                    </button>
                    <button onclick="selectRole('admin')" class="role-card group flex items-center gap-4 p-5 rounded-[2rem] border border-white/10 bg-white/5 hover:border-blue-500/50 transition-all text-left">
                        <div class="w-12 h-12 flex items-center justify-center rounded-2xl bg-indigo-500/10 text-indigo-400 group-hover:bg-indigo-500 group-hover:text-white transition-all">🧠</div>
                        <div>
                            <p class="font-bold text-lg">Admin</p>
                            <p class="text-xs text-slate-500">Full system oversight</p>
                        </div>
                    </button>
                </div>
            </div>
        </div>

        <!-- Footer Info -->
        <p class="mt-8 text-center text-slate-500 text-sm">
            By continuing, you agree to our <span class="text-slate-300">Terms</span> and <span class="text-slate-300">Privacy Policy</span>.
        </p>
    </div>

    <script>
        function showStep(stepId, mode) {
            document.querySelectorAll('#login-methods, #auth-form, #otp-verify, #role-select').forEach(el => el.classList.add('hidden'));
            document.getElementById(stepId).classList.remove('hidden');
            
            if (mode === 'email') {
                document.getElementById('input-label').innerText = 'Email Address';
                document.getElementById('auth-input').placeholder = 'Enter your email';
                document.getElementById('auth-input').type = 'email';
            } else if (mode === 'phone') {
                document.getElementById('input-label').innerText = 'Phone Number';
                document.getElementById('auth-input').placeholder = '+1 (555) 000-0000';
                document.getElementById('auth-input').type = 'tel';
            }
        }

        function fakeLogin(type) {
            console.log('Fake login with:', type);
            showStep('role-select');
        }

        function selectRole(role) {
            console.log('Role selected:', role);
            if (role === 'fan') window.location.href = '/fan';
            else if (role === 'staff' || role === 'admin') window.location.href = '/staff';
        }

        // Auto-focus next OTP input
        const otpInputs = document.querySelectorAll('.otp-input');
        otpInputs.forEach((input, index) => {
            input.addEventListener('keyup', (e) => {
                if (e.target.value.length === 1 && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
                if (e.key === 'Backspace' && index > 0 && e.target.value.length === 0) {
                    otpInputs[index - 1].focus();
                }
            });
        });
    </script>
</body>
</html>
