<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStadium AI - Enter the Future</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #0ea5e9; --accent-glow: rgba(14, 165, 233, 0.4); }
        body { background: radial-gradient(circle at top right, #0f172a 0%, #020617 100%); overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glow-text { text-shadow: 0 0 20px var(--accent-glow); }
        .slide-in { animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .floating { animation: float 6s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="min-h-screen text-slate-100 flex items-center justify-center p-6">
    <!-- Animated background particles -->
    <div class="fixed inset-0 pointer-events-none opacity-30">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-sky-500/20 blur-[120px] rounded-full floating"></div>
        <div class="absolute bottom-1/4 right-1/4 w-80 h-80 bg-indigo-500/10 blur-[100px] rounded-full floating" style="animation-delay: -2s"></div>
    </div>

    <div class="w-full max-w-md relative z-10">
        <!-- Logo Section -->
        <div class="text-center mb-10 slide-in">
            <h1 class="text-4xl font-black tracking-tighter glow-text italic">SMART<span class="text-sky-400">STADIUM</span></h1>
            <p class="text-slate-500 text-xs font-bold uppercase tracking-[0.4em] mt-2">Next-Gen Crowd Intelligence</p>
        </div>

        <!-- Main Card -->
        <div class="glass rounded-[2.5rem] p-8 shadow-2xl slide-in" style="animation-delay: 0.1s">
            
            <!-- Step 1: Persona Selection -->
            <div id="step-persona" class="tab-content active space-y-6">
                <div class="text-center">
                    <h2 class="text-2xl font-bold">Welcome Back</h2>
                    <p class="text-slate-400 text-sm mt-1">Select your portal to continue</p>
                </div>
                
                <div class="grid gap-3">
                    <button onclick="goToStep('login', 'fan')" class="group flex items-center gap-4 w-full p-4 rounded-3xl bg-white/5 border border-white/10 hover:bg-white/10 hover:border-sky-500/50 transition-all text-left">
                        <div class="w-12 h-12 rounded-2xl bg-sky-500/20 flex items-center justify-center text-2xl group-hover:scale-110 transition-transform">👤</div>
                        <div>
                            <p class="font-bold text-slate-100">Fan Portal</p>
                            <p class="text-xs text-slate-500">Live navigation & companion</p>
                        </div>
                    </button>
                    
                    <button onclick="goToStep('login', 'admin')" class="group flex items-center gap-4 w-full p-4 rounded-3xl bg-white/5 border border-white/10 hover:bg-white/10 hover:border-amber-500/50 transition-all text-left">
                        <div class="w-12 h-12 rounded-2xl bg-amber-500/20 flex items-center justify-center text-2xl group-hover:scale-110 transition-transform">🧠</div>
                        <div>
                            <p class="font-bold text-slate-100">Admin Dashboard</p>
                            <p class="text-xs text-slate-500">Global security & ops command</p>
                        </div>
                    </button>
                </div>
            </div>

            <!-- Step 2: Login / Signup -->
            <div id="step-login" class="tab-content space-y-6">
                <div class="flex items-center gap-4 mb-4">
                    <button onclick="goToStep('persona')" class="text-slate-500 hover:text-white transition-colors">← Back</button>
                    <h2 id="login-title" class="text-xl font-bold">Fan Login</h2>
                </div>

                <div class="space-y-4">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500 px-1">Email or Phone</label>
                        <input type="text" placeholder="name@stadium.ai" class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-sky-500 transition-colors">
                    </div>
                    
                    <button onclick="goToStep('otp')" class="w-full py-4 rounded-2xl bg-sky-500 text-white font-bold hover:bg-sky-600 transition-colors shadow-lg shadow-sky-500/25">
                        Continue
                    </button>

                    <div class="relative flex items-center py-2">
                        <div class="flex-grow border-t border-white/10"></div>
                        <span class="flex-shrink mx-4 text-[10px] font-bold uppercase tracking-widest text-slate-600">OR</span>
                        <div class="flex-grow border-t border-white/10"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <button class="flex items-center justify-center gap-2 p-3 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all">
                            <span class="text-sm font-bold">Google</span>
                        </button>
                        <button class="flex items-center justify-center gap-2 p-3 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all">
                            <span class="text-sm font-bold">Apple</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Step 3: OTP Verification -->
            <div id="step-otp" class="tab-content space-y-6 text-center">
                <div class="flex items-center gap-4 text-left">
                    <button onclick="goToStep('login')" class="text-slate-500 hover:text-white transition-colors">← Back</button>
                    <h2 class="text-xl font-bold">Verify Identity</h2>
                </div>
                
                <p class="text-slate-400 text-sm">We've sent a 4-digit code to your device.</p>
                
                <div class="flex justify-center gap-3 mt-4">
                    <input type="text" maxlength="1" class="w-14 h-16 text-center text-2xl font-black bg-white/5 border border-white/10 rounded-2xl focus:border-sky-500 focus:outline-none transition-all">
                    <input type="text" maxlength="1" class="w-14 h-16 text-center text-2xl font-black bg-white/5 border border-white/10 rounded-2xl focus:border-sky-500 focus:outline-none transition-all">
                    <input type="text" maxlength="1" class="w-14 h-16 text-center text-2xl font-black bg-white/5 border border-white/10 rounded-2xl focus:border-sky-500 focus:outline-none transition-all">
                    <input type="text" maxlength="1" class="w-14 h-16 text-center text-2xl font-black bg-white/5 border border-white/10 rounded-2xl focus:border-sky-500 focus:outline-none transition-all">
                </div>

                <button id="final-btn" onclick="finishLogin()" class="w-full mt-8 py-4 rounded-2xl bg-emerald-500 text-white font-bold hover:bg-emerald-600 transition-colors shadow-lg shadow-emerald-500/25">
                    Launch Dashboard
                </button>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-[10px] font-bold uppercase tracking-[0.5em] text-slate-600 mt-10 opacity-50">Authorized Personnel Only • v2.4.0</p>
    </div>

    <script>
        let currentPersona = 'fan';

        function goToStep(stepId, persona) {
            if (persona) {
                currentPersona = persona;
                document.getElementById('login-title').innerText = `${persona.charAt(0).toUpperCase() + persona.slice(1)} Login`;
            }
            
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(`step-${stepId}`).classList.add('active');
        }

        function finishLogin() {
            const btn = document.getElementById('final-btn');
            btn.innerText = 'Syncing AI...';
            btn.disabled = true;
            
            setTimeout(() => {
                const target = currentPersona === 'fan' ? '/fan' : '/staff';
                window.location.href = target;
            }, 1500);
        }

        // Auto-focus next OTP input
        const inputs = document.querySelectorAll('#step-otp input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', () => {
                if (input.value && index < inputs.length - 1) inputs[index + 1].focus();
            });
        });
    </script>
</body>
</html>
