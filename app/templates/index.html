<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStadium AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #172554 100%);
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center text-white overflow-hidden relative">
    <!-- Glowing background orbs -->
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-500/20 rounded-full blur-[100px] animate-pulse"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-emerald-500/20 rounded-full blur-[100px] animate-pulse" style="animation-delay: 2s;"></div>

    <div class="z-10 text-center space-y-8 glass p-12 rounded-3xl max-w-2xl w-full mx-4 shadow-2xl">
        <div class="space-y-4">
            <h1 class="text-6xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-emerald-400 to-teal-200 drop-shadow-lg">
                SmartStadium AI
            </h1>
            <p class="text-xl text-slate-300 font-light">Next-Gen Real-Time Event Intelligence.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-8">
            <a href="/fan" class="group relative px-6 py-8 glass rounded-2xl hover:bg-white/10 transition-all duration-300 transform hover:-translate-y-2 border border-blue-500/30 hover:shadow-[0_0_30px_rgba(59,130,246,0.3)]">
                <div class="text-4xl mb-4 group-hover:scale-110 transition-transform">🎫</div>
                <h2 class="text-2xl font-bold mb-2">Fan Experience</h2>
                <p class="text-sm text-slate-400">Mobile-first app for optimal routing and live wait times.</p>
            </a>
            
            <a href="/staff" class="group relative px-6 py-8 glass rounded-2xl hover:bg-white/10 transition-all duration-300 transform hover:-translate-y-2 border border-emerald-500/30 hover:shadow-[0_0_30px_rgba(16,185,129,0.3)]">
                <div class="text-4xl mb-4 group-hover:scale-110 transition-transform">🛡️</div>
                <h2 class="text-2xl font-bold mb-2">Command Center</h2>
                <p class="text-sm text-slate-400">High-density analytics and AI auto-deployment for staff.</p>
            </a>
        </div>
    </div>
</body>
</html>
